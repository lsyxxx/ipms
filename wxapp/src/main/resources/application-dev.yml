spring:
  # ---- jpa
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        
  # --------- datasource
  datasource:
    url: jdbc:sqlserver://localhost:1433;database=ZJData;trustServerCertificate=true
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: sa
    password: "123456"
    # password: abt@23328
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 20
    
