
spring:
  application:
    name: wxapp
  profiles:
    active: yuan


  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      ddl-auto: update
    properties:
      hibernate:
        use_sql_comments: true
        jdbc:
          batch_size: 100
        order_inserts: true

